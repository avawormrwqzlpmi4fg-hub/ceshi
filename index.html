<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting to Support...</title>
    
    <script>
        !function(f,b,e,v,n,t,s)
        {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
        n.callMethod.apply(n,arguments):n.queue.push(arguments)};
        if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
        n.queue=[];t=b.createElement(e);t.async=!0;
        t.src=v;s=b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t,s)}(window, document,'script',
        'https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '1465362682055475');
        
        // 页面一加载，立即触发 PageView
        fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=1465362682055475&ev=PageView&noscript=1"/></noscript>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #05070a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 255, 102, 0.2);
            border-top: 4px solid #00ff66;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 25px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h2 { font-size: 20px; font-weight: 500; margin-bottom: 10px; letter-spacing: 0.5px; }
        p { font-size: 14px; color: #8b9bb4; margin-bottom: 30px; padding: 0 20px;}

        #fallback-btn {
            display: none; background-color: #00ff66; color: #000;
            padding: 14px 28px; border-radius: 50px; text-decoration: none;
            font-weight: bold; font-size: 16px; transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,255,102,0.3);
        }
        #fallback-btn:hover { background-color: #33ff85; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="spinner"></div>
    <h2>Redirecting to WhatsApp...</h2>
    <p>Please wait while we connect you to your assigned strategist.</p>
    
    <a href="#" id="fallback-btn">Open WhatsApp Manually</a>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            // 1. 客服号码池
            const whatsappPool = [
                { phone: "61450078293", text: "Hi! I'm ready to upgrade my trading. I'd like access to the VIP inner circle and 1-on-1 expert guidance. How do I start?" }, 
                { phone: "61451494563", text: "Hi! I'm ready to upgrade my trading. I'd like access to the VIP inner circle and 1-on-1 expert guidance. How do I start?" }, 
                { phone: "61451442595", text: "Hi! I'm ready to upgrade my trading. I'd like access to the VIP inner circle and 1-on-1 expert guidance. How do I start?" }  
            ];

            // 2. 24小时防撞单分配缓存
            const LOCK_DURATION = 180 * 24 * 60 * 60 * 1000; 
            const now = new Date().getTime();
            let selectedTarget = null;
            const cachedShuntData = localStorage.getItem('wa_assigned_client');
            
            if (cachedShuntData) {
                try {
                    const parsedData = JSON.parse(cachedShuntData);
                    if (now - parsedData.timestamp < LOCK_DURATION) {
                        selectedTarget = parsedData.target;
                    }
                } catch (err) {
                    localStorage.removeItem('wa_assigned_client');
                }
            }

            if (!selectedTarget) {
                const randomIndex = Math.floor(Math.random() * whatsappPool.length);
                selectedTarget = whatsappPool[randomIndex];
                localStorage.setItem('wa_assigned_client', JSON.stringify({ target: selectedTarget, timestamp: now }));
            }

            const targetPhone = selectedTarget.phone;
            const encodedText = encodeURIComponent(selectedTarget.text);
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const isMobile = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(userAgent);
            
            // 3. 【核心更新】构建双重唤醒长链
            // appUrl: 最强穿透力，直接请求系统唤醒 App
            const appUrl = `whatsapp://send?phone=${targetPhone}&text=${encodedText}`;
            // webUrl: 官方标准长链，作为退路和 PC 端方案
            const webUrl = `https://wa.me/${targetPhone}?text=${encodedText}`;

            // 将手动兜底按钮设为最稳妥的 webUrl
            document.getElementById('fallback-btn').href = webUrl;

            // 4. 触发 Contact 事件 (100% 不漏报)
            if (typeof fbq === 'function') {
                fbq('track', 'Contact', {
                    traffic_source: 'Meta_Lead_Form_Funnel',
                    assigned_whatsapp: targetPhone
                });
                console.log("Contact 事件已成功发送给 Meta");
            }

            // 5. 延迟 1.5 秒后执行强力穿透重定向
            setTimeout(function() {
                if (isMobile) {
                    // 移动端：动态创建 A 标签模拟用户点击，暴力穿透 FB 内置浏览器
                    const link = document.createElement('a');
                    link.href = appUrl;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);

                    // 二级兜底：如果系统强行拦截了原生 intent 协议，1.2秒后用标准链接补救
                    setTimeout(function() {
                        window.location.href = webUrl;
                    }, 1200);
                } else {
                    // PC 端：直接使用通用 Web 协议跳转
                    window.location.href = webUrl;
                }
            }, 1500);

            // 6. 三级防失联兜底：3.5秒后显示手动点击按钮
            setTimeout(function() {
                document.getElementById('fallback-btn').style.display = 'inline-block';
                document.querySelector('.spinner').style.display = 'none';
                document.querySelector('h2').innerText = 'Ready to Connect';
                document.querySelector('p').innerText = 'If WhatsApp did not open automatically, please click below.';
            }, 3500);

        });
    </script>
</body>
</html>

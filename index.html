<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting to Support...</title>
    
    <script>
        !function(f,b,e,v,n,t,s)
        {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
        n.callMethod.apply(n,arguments):n.queue.push(arguments)};
        if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
        n.queue=[];t=b.createElement(e);t.async=!0;
        t.src=v;s=b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t,s)}(window, document,'script',
        'https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '4382273508695278');
        
        // 页面一加载，立即触发 PageView
        fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=4382273508695278&ev=PageView&noscript=1"/></noscript>

    <style>
        /* 极简暗黑科技风加载页 */
        body {
            margin: 0;
            padding: 0;
            background-color: #05070a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        /* 呼吸加载圈 */
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 255, 102, 0.2);
            border-top: 4px solid #00ff66;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 25px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h2 {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        p {
            font-size: 14px;
            color: #8b9bb4;
            margin-bottom: 30px;
        }

        /* 兜底手动跳转按钮（默认隐藏，超时后显示） */
        #fallback-btn {
            display: none;
            background-color: #00ff66;
            color: #000;
            padding: 12px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
            transition: all 0.3s;
        }

        #fallback-btn:hover {
            background-color: #33ff85;
        }
    </style>
</head>
<body>

    <div class="spinner"></div>
    <h2>Redirecting to WhatsApp...</h2>
    <p>Please wait while we connect you to your assigned strategist.</p>
    
    <a href="#" id="fallback-btn">Click here if not redirected</a>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            // 1. 客服号码池（可随时增减）
            const whatsappPool = [
                { phone: "61451343158", text: "Hi! I just completed the questionnaire. I'm ready to get my 1-on-1 strategy and join the VIP circle." }, 
                { phone: "61451324807", text: "Hi! I just completed the questionnaire. I'm ready to get my 1-on-1 strategy and join the VIP circle." }  
            ];

            // 2. 24小时防撞单分配缓存
            const LOCK_DURATION = 24 * 60 * 60 * 1000; 
            const now = new Date().getTime();
            let selectedTarget = null;
            const cachedShuntData = localStorage.getItem('wa_assigned_client');
            
            if (cachedShuntData) {
                try {
                    const parsedData = JSON.parse(cachedShuntData);
                    if (now - parsedData.timestamp < LOCK_DURATION) {
                        selectedTarget = parsedData.target;
                    }
                } catch (err) {
                    localStorage.removeItem('wa_assigned_client');
                }
            }

            if (!selectedTarget) {
                const randomIndex = Math.floor(Math.random() * whatsappPool.length);
                selectedTarget = whatsappPool[randomIndex];
                localStorage.setItem('wa_assigned_client', JSON.stringify({ target: selectedTarget, timestamp: now }));
            }

            // 3. 构建 WhatsApp 唤醒长链
            const targetPhone = selectedTarget.phone;
            const encodedText = encodeURIComponent(selectedTarget.text);
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const isFacebook = (userAgent.indexOf("FBAN") > -1) || (userAgent.indexOf("FBAV") > -1);
            const isMobile = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(userAgent);
            
            let finalUrl = (isFacebook || isMobile) 
                ? `https://api.whatsapp.com/send?phone=${targetPhone}&text=${encodedText}` 
                : `https://wa.me/${targetPhone}?text=${encodedText}`;

            // 将兜底按钮的链接设为最终链接
            document.getElementById('fallback-btn').href = finalUrl;

            // 4. 【核心】只要客户进入这个分流页，就代表表单填完，立刻触发 Contact 事件
            if (typeof fbq === 'function') {
                fbq('track', 'Contact', {
                    traffic_source: 'Meta_Lead_Form_Funnel',
                    assigned_whatsapp: targetPhone
                });
                console.log("Contact 事件已成功发送给 Meta");
            }

            // 5. 延迟重定向 (1.2 秒)
            // 作用：让 Meta 像素有足够时间发包，同时规避浏览器对瞬间跳转的拦截
            setTimeout(function() {
                window.location.href = finalUrl;
            }, 1200);

            // 6. 防失联兜底机制：如果 3 秒后页面还在（跳转被拦截），显示手动点击按钮
            setTimeout(function() {
                document.getElementById('fallback-btn').style.display = 'inline-block';
                document.querySelector('.spinner').style.display = 'none';
                document.querySelector('h2').innerText = 'Ready to Connect';
                document.querySelector('p').innerText = 'Please click the button below to open WhatsApp.';
            }, 3000);

        });
    </script>
</body>
</html>
